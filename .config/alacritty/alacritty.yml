window:
  dimensions:
    columns: 139
    lines: 74

  position:
    x: 1280
    y: 0

  padding:
    x: 15
    y: 10

  dynamic_padding: true
  decorations: none
  dynamic_title: true
  startup_mode: Maximized

scrolling:
  history: 10000
  multiplier: 4

font:
  offset:
    # x: -1
    y: -1
  size: 12.0
  normal:
    family: JetBrainsMono NF

  bold:
    family: JetBrainsMonoNL NF

  italic:
    family: JetBrainsMonoNL NF

colors:
  primary:
    background: '#1c1c1c'
    foreground: '#c6c6c6'

  normal:
    black:   '#666666'
    red:     '#F07178'
    green:   '#C3E88D'
    yellow:  '#FFCB6B'
    blue:    '#82AAFF'
    magenta: '#C792EA'
    cyan:    '#89DDFF'
    white:   '#FFFFFF'

  bright:
    black:   '#444444'
    red:     '#F07178'
    green:   '#C3E88D'
    yellow:  '#FFCB6B'
    blue:    '#82AAFF'
    magenta: '#C792EA'
    cyan:    '#89DDFF'
    white:   '#FFFFFF'

    draw_bold_text_with_bright_colors: true

shell:
  program: /usr/bin/tmux
  # program: /usr/bin/zsh

live_config_reload: true
