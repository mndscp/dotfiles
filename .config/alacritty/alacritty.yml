window:
  dimensions:
    columns: 139
    lines: 70

  position:
    x: 1280
    y: 0

  padding:
    x: 15
    y: 10

  dynamic_padding: true
  decorations: none
  opacity: 0.92
  dynamic_title: true
  # startup_mode: Maximized

scrolling:
  history: 10000
  multiplier: 4

font:
  size: 11.0
  normal:
    family: JetBrainsMonoNL Nerd Font
    style: Regular

  bold:
    family: JetBrainsMonoNL Nerd Font
    style: Bold

  italic:
    family: JetBrainsMonoNL Nerd Font
    style: Italic

colors:
  primary:
    background: '#1c1c1c'
    foreground: '#c6c6c6'

  normal:
    black:   '#666666'
    red:     '#F07178'
    green:   '#C3E88D'
    yellow:  '#FFCB6B'
    blue:    '#82AAFF'
    magenta: '#C792EA'
    cyan:    '#89DDFF'
    white:   '#FFFFFF'

  bright:
    black:   '#444444'
    red:     '#F07178'
    green:   '#C3E88D'
    yellow:  '#FFCB6B'
    blue:    '#82AAFF'
    magenta: '#C792EA'
    cyan:    '#89DDFF'
    white:   '#FFFFFF'

shell:
  program: /usr/bin/zsh

live_config_reload: true
